<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Luna Pro | Gestão Financeira</title>
  <style>
    :root {
      --accent: #4CAF50;
      --btc-orange: #f7931a;
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --text-light: #e2e8f0;
      --text-dark: #0f172a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      margin: 0;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      background: #f2f2f2;
      color: var(--text-dark);
      line-height: 1.5;
    }

    /* === MODO DARK (melhorado e corrigido) === */
    @media (prefers-color-scheme: dark) {
      body {
        background: var(--bg-dark);
        color: var(--text-light);
      }
      .container {
        background: var(--card-dark);
        border: 1px solid #334155;
      }
      input {
        background: #1e293b;
        color: var(--text-light);
        border: 1px solid #475569;
      }
      input:focus {
        border-color: var(--btc-orange);
        box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.2);
      }
      .resultado {
        background: rgba(15, 23, 42, 0.6);
      }
      h3 {
        border-bottom: 1px solid #334155;
      }
      .divider {
        border-top-color: #334155;
      }
    }

    .container {
      background: #fff;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 460px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* === RESPONSIVIDADE MOBILE & WEBAPP === */
    @media (max-width: 480px) {
      body {
        padding: 8px;
      }
      .container {
        padding: 18px;
        border-radius: 16px;
        max-width: 100%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }
      h2 {
        font-size: 1.45rem;
      }
      input,
      button {
        font-size: 1.05rem;
        padding: 14px 12px;
      }
      label {
        font-size: 0.78rem;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .container {
        max-width: 420px;
      }
    }

    h2 {
      text-align: center;
      margin: 0 0 24px 0;
      font-size: 1.35rem;
      color: var(--btc-orange);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
    }

    h3 {
      font-size: 0.9rem;
      margin: 28px 0 12px 0;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
      opacity: 0.85;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 5px;
      opacity: 0.9;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      font-size: 1rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--btc-orange);
      box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.25);
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      background: var(--btc-orange);
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
    }

    button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(247, 147, 26, 0.4);
    }

    button[style*="var(--accent)"] {
      background: var(--accent);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }

    .resultado {
      margin-top: 18px;
      padding: 18px;
      background: #f8fafc;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.65;
      border: 1px solid #e2e8f0;
      display: none;
    }

    .destaque-total {
      font-size: 1.15rem;
      color: var(--btc-orange);
      display: block;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(247, 147, 26, 0.25);
      padding-bottom: 6px;
      font-weight: 700;
    }

    .ajuste-msg {
      display: block;
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      text-align: center;
      font-size: 0.95rem;
    }

    .divider {
      margin: 32px 0;
      border-top: 2px dashed #e2e8f0;
      opacity: 0.35;
    }

    /* Melhoria de acessibilidade e foco */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Estratégia Luna ₿</h2>

  <h3>Rebalanceamento de Carteira</h3>
  <div class="grid">
    <div>
      <label for="btc">Saldo BTC (R$)</label>
      <input type="number" id="btc" placeholder="0.00" step="0.01">
    </div>
    <div>
      <label for="caixa">Saldo Caixa (R$)</label>
      <input type="number" id="caixa" placeholder="0.00" step="0.01">
    </div>
  </div>

  <div class="grid">
    <div>
      <label for="mBtc">Meta BTC (%)</label>
      <input type="number" id="mBtc" value="50" step="1">
    </div>
    <div>
      <label for="mCaixa">Meta Caixa (%)</label>
      <input type="number" id="mCaixa" value="50" step="1">
    </div>
  </div>

  <button onclick="analisar()">Analisar e Rebalancear</button>
  <div id="resAnalise" class="resultado"></div>

  <div class="divider"></div>

  <h3>Calculadora de Diferença (%)</h3>
  <div class="grid">
    <div>
      <label for="vIni">Valor Inicial (R$)</label>
      <input type="number" id="vIni" placeholder="0.00" step="0.01">
    </div>
    <div>
      <label for="vFin">Valor Final (R$)</label>
      <input type="number" id="vFin" placeholder="0.00" step="0.01">
    </div>
  </div>
  <button style="background:var(--accent)" onclick="calcPct()">Calcular Diferença</button>
  <div id="resPct" class="resultado"></div>

  <div class="divider"></div>

  <h3>Cálculo de Acréscimo (%)</h3>
  <div class="grid">
    <div>
      <label for="vBase">Valor Base (R$)</label>
      <input type="number" id="vBase" placeholder="0.00" step="0.01">
    </div>
    <div>
      <label for="pctAdd">Porcentagem de Acréscimo (%)</label>
      <input type="number" id="pctAdd" placeholder="0" step="0.1">
    </div>
  </div>
  <button style="background:var(--accent)" onclick="calcValorFinal()">Calcular Valor Final</button>
  <div id="resFinal" class="resultado"></div>
</div>

<script>
  /* === JS ORIGINAL (100% inalterado) === */
  function analisar() {
    const b = parseFloat(document.getElementById('btc').value) || 0;
    const c = parseFloat(document.getElementById('caixa').value) || 0;
    const mb = parseFloat(document.getElementById('mBtc').value) || 50;
    const div = document.getElementById('resAnalise');

    const total = b + c;
    if(total === 0) return;

    const pB = (b / total) * 100;
    const pC = (c / total) * 100;
    const idealB = (total * mb) / 100;
    const dif = b - idealB;

    let msg = "";
    if (Math.abs(dif) < 1) {
      msg = `<span class="ajuste-msg" style="color:var(--accent); background:rgba(76,175,80,0.1)">✅ Equilibrado!</span>`;
    } else if (dif > 0) {
      msg = `<span class="ajuste-msg">Mover R$ ${dif.toFixed(2)} do BTC p/ Caixa</span>`;
    } else {
      msg = `<span class="ajuste-msg">Mover R$ ${Math.abs(dif).toFixed(2)} do Caixa p/ BTC</span>`;
    }

    div.style.display = "block";
    div.innerHTML = `
      <strong class="destaque-total">Total: R$ ${total.toFixed(2)}</strong>
      ₿ <strong>BTC:</strong> R$ ${b.toFixed(2)} (${pB.toFixed(1)}%) <br>
      💵 <strong>Caixa:</strong> R$ ${c.toFixed(2)} (${pC.toFixed(1)}%) <br>
      ${msg}
    `;
  }

  function calcPct() {
    const i = parseFloat(document.getElementById('vIni').value);
    const f = parseFloat(document.getElementById('vFin').value);
    const div = document.getElementById('resPct');
    if(!i || !f) return;
    const d = f - i;
    const p = (d / i) * 100;
    div.style.display = "block";
    div.innerHTML = `Diferença: <strong>R$ ${d.toFixed(2)}</strong> (${p.toFixed(2)}%)`;
  }

  function calcValorFinal() {
    const base = parseFloat(document.getElementById('vBase').value);
    const pct = parseFloat(document.getElementById('pctAdd').value);
    const div = document.getElementById('resFinal');
    if(isNaN(base) || isNaN(pct)) return;
    const add = (base * pct) / 100;
    const total = base + add;
    div.style.display = "block";
    div.innerHTML = `Acréscimo: <strong>R$ ${add.toFixed(2)}</strong> <br> Valor Final: <strong>R$ ${total.toFixed(2)}</strong>`;
  }
</script>

</body>
</html>
