<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luna | Gestão de Portfólio BTC</title>
  <style>
    :root {
      --accent: #4CAF50;
      --btc-orange: #f7931a;
      --text-main: #0f172a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f2f2f2;
      color: var(--text-main);
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #1a1101; }
      .container { background: #1e293b; border: 1px solid #334155; }
      input { background: #0f172a; color: #e2e8f0; border: 1px solid #475569; }
      h2, h3 { color: #1a1101; }
      label { color: #cbd5e1; }
      .resultado { background: rgba(255,255,255,0.05); }
    }

    .container {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
      box-sizing: border-box;
    }

    h2, h3 { text-align: center; margin-bottom: 16px; margin-top: 0; }
    h2 { font-size: 1.5rem; border-bottom: 2px solid var(--btc-orange); padding-bottom: 8px; }
    h3 { font-size: 1rem; color: var(--btc-orange); margin-top: 20px; }

    .grid-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 6px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--btc-orange);
      box-shadow: 0 0 0 2px rgba(247, 147, 26, 0.2);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--btc-orange);
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
    }

    button:hover { background: #e8830e; transform: translateY(-1px); }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #1a1101;
      border-radius: 10px;
      font-size: 0.95rem;
      text-align: center;
      border-left: 4px solid var(--btc-orange);
    }

    .alerta-ajuste {
      margin-top: 10px;
      color: #38bdf8;
      font-weight: 700;
      display: block;
      font-size: 1.05rem;
    }

    .divider { margin: 30px 0; border-top: 1px dashed #cbd5e1; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Estratégia Luna ₿</h2>

    <h3>Balanceamento de Carteira</h3>
    
    <div class="grid-inputs">
      <div>
        <label>Saldo BTC (R$)</label>
        <input type="number" id="saldoBtc" placeholder="Ex: 6000">
      </div>
      <div>
        <label>Saldo Caixa (R$)</label>
        <input type="number" id="saldoCaixa" placeholder="Ex: 4000">
      </div>
    </div>

    <div class="grid-inputs" style="margin-top: 10px;">
      <div>
        <label>Meta BTC (%)</label>
        <input type="number" id="metaBtc" value="50">
      </div>
      <div>
        <label>Meta Caixa (%)</label>
        <input type="number" id="metaCaixa" value="50">
      </div>
    </div>

    <button onclick="calcularPortfolio()">Analisar e Rebalancear</button>
    
    <div class="resultado" id="resPort">
      Insira os valores para calcular o ajuste.
    </div>

    <div class="divider"></div>

    <label>Valor Inicial vs Final (Diferença %)</label>
    <div class="grid-inputs">
      <input type="number" id="vInic" placeholder="Início">
      <input type="number" id="vFin" placeholder="Fim">
    </div>
    <button style="background: var(--accent);" onclick="calcDif()">Calcular Diferença</button>
    <div class="resultado" id="resDif">---</div>

  </div>

  <script>
    function calcularPortfolio() {
      const btc = parseFloat(document.getElementById('saldoBtc').value) || 0;
      const caixa = parseFloat(document.getElementById('saldoCaixa').value) || 0;
      const mBtc = parseFloat(document.getElementById('metaBtc').value) || 50;
      const mCaixa = parseFloat(document.getElementById('metaCaixa').value) || 50;
      const res = document.getElementById('resPort');

      if (btc + caixa === 0) return;

      const total = btc + caixa;
      const btcAtualPerc = (btc / total) * 100;
      const caixaAtualPerc = (caixa / total) * 100;

      // Cálculo do valor ideal baseado na meta
      const btcIdeal = (total * mBtc) / 100;
      const caixaIdeal = (total * mCaixa) / 100;
      
      let mensagemAjuste = "";
      const diff = btc - btcIdeal;

      if (diff > 1) {
        mensagemAjuste = `<span class="alerta-ajuste">Mover R$ ${diff.toFixed(2)} do BTC para o Caixa</span>`;
      } else if (diff < -1) {
        mensagemAjuste = `<span class="alerta-ajuste">Mover R$ ${Math.abs(diff).toFixed(2)} do Caixa para o BTC</span>`;
      } else {
        mensagemAjuste = `<span class="alerta-ajuste" style="color:var(--accent)">Portfólio em Equilíbrio Perfeito!</span>`;
      }

      res.innerHTML = `
        <strong>Total: R$ ${total.toFixed(2)}</strong><br>
        ₿ ${btcAtualPerc.toFixed(1)}% | 💵 ${caixaAtualPerc.toFixed(1)}%<br>
        ${mensagemAjuste}
      `;
    }

    function calcDif() {
      const i = parseFloat(document.getElementById('vInic').value);
      const f = parseFloat(document.getElementById('vFin').value);
      const res = document.getElementById('resDif');
      if (!i || !f) return;
      const p = ((f - i) / i) * 100;
      res.innerHTML = `Diferença: R$ ${(f-i).toFixed(2)} (${p.toFixed(2)}%)`;
    }
  </script>
</body>
</html>
