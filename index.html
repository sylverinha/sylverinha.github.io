<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador VA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f4f4;
      color: #333;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    main {
      max-width: 600px;
      margin: auto;
      padding: 1rem;
    }
    label {
      display: block;
      margin-top: 1rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.3rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 1rem;
      padding: 0.7rem;
      width: 100%;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    .resultado {
      margin-top: 2rem;
      padding: 1rem;
      background: white;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.5rem;
      text-align: center;
    }
    th {
      background: #f0f0f0;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .actions button {
      flex: 1;
    }
  </style>
</head>
<body>
  <header>
    <h1>Simulador Value Averaging (VA)</h1>
    <p>Calcule e acompanhe seus aportes</p>
  </header>
  <main>
    <label>Valor alvo (R$): 
      <input type="number" id="alvo" placeholder="Ex: 10000">
    </label>
    <label>Patrimônio atual (R$): 
      <input type="number" id="patrimonio" placeholder="Ex: 8000">
    </label>
    <label>Crescimento desejado (% ao mês): 
      <input type="number" id="crescimento" placeholder="Ex: 2">
    </label>
    <button onclick="calcularVA()">Calcular aporte</button>

    <div class="actions">
      <button onclick="salvarDados()">Salvar dados</button>
      <button onclick="exportarDados()">Exportar JSON</button>
      <input type="file" id="importarArquivo" style="display:none" onchange="importarDados(event)">
      <button onclick="document.getElementById('importarArquivo').click()">Importar JSON</button>
    </div>

    <div class="resultado" id="resultado"></div>
  </main>

  <script>
    function calcularVA() {
      const alvo = parseFloat(document.getElementById('alvo').value);
      const patrimonio = parseFloat(document.getElementById('patrimonio').value);
      const crescimento = parseFloat(document.getElementById('crescimento').value);

      if (isNaN(alvo) || isNaN(patrimonio) || isNaN(crescimento)) {
        document.getElementById('resultado').innerHTML = "<p>Preencha todos os campos corretamente.</p>";
        return;
      }

      const alvoProximo = alvo * (1 + crescimento/100);
      const aporteNecessario = Math.max(0, alvoProximo - patrimonio);

      document.getElementById('resultado').innerHTML = `
        <h2>Resultado</h2>
        <p>Alvo do próximo mês: <strong>R$ ${alvoProximo.toFixed(2)}</strong></p>
        <p>Patrimônio atual: <strong>R$ ${patrimonio.toFixed(2)}</strong></p>
        <p>Aporte necessário: <strong>R$ ${aporteNecessario.toFixed(2)}</strong></p>
      `;
    }

    function salvarDados() {
      const dados = {
        alvo: document.getElementById('alvo').value,
        patrimonio: document.getElementById('patrimonio').value,
        crescimento: document.getElementById('crescimento').value
      };
      localStorage.setItem("VA_dados", JSON.stringify(dados));
      alert("Dados salvos no navegador!");
    }

    function carregarDados() {
      const dados = JSON.parse(localStorage.getItem("VA_dados"));
      if (dados) {
        document.getElementById('alvo').value = dados.alvo;
        document.getElementById('patrimonio').value = dados.patrimonio;
        document.getElementById('crescimento').value = dados.crescimento;
      }
    }

    function exportarDados() {
      const dados = localStorage.getItem("VA_dados");
      if (!dados) {
        alert("Nenhum dado salvo para exportar.");
        return;
      }
      const blob = new Blob([dados], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "VA_dados.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importarDados(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        const dados = JSON.parse(e.target.result);
        localStorage.setItem("VA_dados", JSON.stringify(dados));
        carregarDados();
        alert("Dados importados com sucesso!");
      };
      reader.readAsText(file);
    }

    window.onload = carregarDados;
  </script>
</body>
</html>
