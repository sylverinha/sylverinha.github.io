<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Luna | BTC & Caixa</title>
  <style>
    :root {
      --accent: #4CAF50;
      --btc-orange: #f7931a;
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f2f2f2;
      color: #0f172a;
    }

    @media (prefers-color-scheme: dark) {
      body { background: var(--bg-dark); color: #1a1101; }
      .container { background: var(--card-dark); border: 1px solid #334155; }
      input { background: var(--bg-dark); color: #e2e8f0; border: 1px solid #475569; }
      .resultado { background: rgba(0,0,0,0.2); }
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 440px;
      box-sizing: border-box;
    }

    h2 { text-align: center; margin: 0 0 20px 0; font-size: 1.3rem; color: var(--btc-orange); text-transform: uppercase; letter-spacing: 1px; }
    h3 { font-size: 0.9rem; margin: 20px 0 10px 0; border-bottom: 1px solid #ddd; padding-bottom: 5px; opacity: 0.8; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    
    label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      background: var(--btc-orange);
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .resultado {
      margin-top: 15px;
      padding: 15px;
      background: #1a1101;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .destaque-total { font-size: 1.1rem; color: var(--btc-orange); display: block; margin-bottom: 8px; border-bottom: 1px solid rgba(247, 147, 26, 0.2); padding-bottom: 5px; }
    .ajuste-msg { display: block; margin-top: 10px; padding: 10px; border-radius: 6px; background: rgba(56, 189, 248, 0.1); color: #38bdf8; font-weight: 700; text-align: center; }
    
    .divider { margin: 25px 0; border-top: 2px dashed #ddd; opacity: 0.3; }
  </style>
</head>
<body>

<div class="container">
  <h2>Estratégia Luna ₿</h2>

  <div class="grid">
    <div>
      <label>Saldo BTC (R$)</label>
      <input type="number" id="btc" placeholder="0.00">
    </div>
    <div>
      <label>Saldo Caixa (R$)</label>
      <input type="number" id="caixa" placeholder="0.00">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Meta BTC (%)</label>
      <input type="number" id="mBtc" value="50">
    </div>
    <div>
      <label>Meta Caixa (%)</label>
      <input type="number" id="mCaixa" value="50">
    </div>
  </div>

  <button onclick="analisar()">Analisar Carteira</button>

  <div id="resAnalise" class="resultado" style="display:none;"></div>

  <div class="divider"></div>

  <h3>Calculadora de Diferença (%)</h3>
  <div class="grid">
    <input type="number" id="vIni" placeholder="Inicial">
    <input type="number" id="vFin" placeholder="Final">
  </div>
  <button style="background:var(--accent)" onclick="calcPct()">Calcular Diferença %</button>
  <div id="resPct" class="resultado" style="display:none;"></div>

</div>

<script>
  function analisar() {
    const b = parseFloat(document.getElementById('btc').value) || 0;
    const c = parseFloat(document.getElementById('caixa').value) || 0;
    const mb = parseFloat(document.getElementById('mBtc').value) || 50;
    const mc = parseFloat(document.getElementById('mCaixa').value) || 50;
    const div = document.getElementById('resAnalise');

    const total = b + c;
    if(total === 0) return;

    const pB = (b / total) * 100;
    const pC = (c / total) * 100;
    
    const idealB = (total * mb) / 100;
    const dif = b - idealB;

    let msg = "";
    if (Math.abs(dif) < 1) {
      msg = `<span class="ajuste-msg" style="color:var(--accent); background:rgba(76,175,80,0.1)">✅ Carteira Equilibrada!</span>`;
    } else if (dif > 0) {
      msg = `<span class="ajuste-msg">Vender R$ ${dif.toFixed(2)} de BTC p/ Caixa</span>`;
    } else {
      msg = `<span class="ajuste-msg">Mover R$ ${Math.abs(dif).toFixed(2)} do Caixa p/ BTC</span>`;
    }

    div.style.display = "block";
    div.innerHTML = `
      <strong class="destaque-total">Patrimônio Total: R$ ${total.toFixed(2)}</strong>
      <strong>BTC:</strong> R$ ${b.toFixed(2)} (${pB.toFixed(1)}%) <br>
      <strong>Caixa:</strong> R$ ${c.toFixed(2)} (${pC.toFixed(1)}%) <br>
      ${msg}
    `;
  }

  function calcPct() {
    const i = parseFloat(document.getElementById('vIni').value);
    const f = parseFloat(document.getElementById('vFin').value);
    const div = document.getElementById('resPct');
    
    if(!i || !f) return;
    
    const d = f - i;
    const p = (d / i) * 100;
    
    div.style.display = "block";
    div.innerHTML = `
      Diferença: <strong>R$ ${d.toFixed(2)}</strong> <br>
      Percentual: <strong>${p.toFixed(2)}%</strong>
    `;
  }
</script>

</body>
</html>
